name: Frontend Web CI

on:
  push:
    branches:
      - main
      - master
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "next.config.js"
      - "postcss.config.js"
      - "tailwind.config.js"
      - "tsconfig.json"
      - ".github/workflows/frontend-web-ci.yml"
  pull_request:
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "next.config.js"
      - "postcss.config.js"
      - "tailwind.config.js"
      - "tsconfig.json"
      - ".github/workflows/frontend-web-ci.yml"
  workflow_dispatch:

jobs:
  quality:
    name: Lint, type-check and build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run type check
        run: npm run type-check

      - name: Build app
        run: npm run build
